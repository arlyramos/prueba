<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Hospital Amra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #1e3c72, #162742);
        }

        .login-container{
            background:white;
            width:350px;
            padding:35px;
            border-radius:15px;
            box-shadow:0 15px 40px rgba(0,0,0,0.2);
            text-align:center;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:#162742;
            margin-bottom:10px;
        }

        .subtitle{
            font-size:14px;
            color:#666;
            margin-bottom:25px;
        }

        .input-group{
            text-align:left;
            margin-bottom:18px;
        }

        label{
            font-size:13px;
            color:#444;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border-radius:8px;
            border:1px solid #ccc;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#2a5298;
            box-shadow:0 0 5px rgba(152, 101, 42, 0.3);
        }

        button{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:8px;
            background:#162742;
            color:rgb(255, 255, 255);
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#162742;
        }

        .footer-text{
            font-size:12px;
            color:#999;
            margin-top:20px;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo">Hospital Amra</div>
        <div class="subtitle">Análisis Médico con IA</div>

        <form id="loginForm">
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" id="username" placeholder="Ingrese su usuario" required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="Ingrese su contraseña" required>
            </div>

            <button type="submit">Iniciar Sesión</button>

            <div id="errorMsg" style="display:none; margin-top:10px; color:red; font-size:13px;">
                Usuario o contraseña incorrectos
            </div>
        </form>

        <div class="footer-text">
          Proyecto de Ciencia de Datos
        </div>
    </div>

    <!-- ✅ SCRIPT AL FINAL (ya existe el form cuando corre) -->
    <script>
        // Usuarios válidos
        const users = [
            { user: "arlette", pass: "123" },
            { user: "doctor", pass: "abcd" }
        ];

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorBox = document.getElementById("errorMsg");

            const validUser = users.find(u => u.user === username && u.pass === password);

            if(validUser){
                localStorage.setItem("loggedIn", "true");
                localStorage.setItem("userName", username);
                window.location.href = "modelo.html";  // tu segunda página
            } else {
                errorBox.style.display = "block";
            }
        });
    </script>

</body>
</html>
