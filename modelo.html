<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Análisis - Hospital Amra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{box-sizing:border-box;font-family:'Segoe UI',sans-serif}

        body{
            margin:0;
            background:#f4f6fb;
            padding:25px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,0.1);
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:10px;
            flex-wrap:wrap;
        }

        h1{
            margin:0;
            color:#162742;
        }

        .logout{
            background:#162742;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:8px;
            cursor:pointer;
        }

        .grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
            margin-top:20px;
        }

        @media(max-width:900px){
            .grid{grid-template-columns:1fr;}
        }

        .box{
            border:1px solid #ddd;
            padding:15px;
            border-radius:12px;
        }

        label{
            font-weight:bold;
            font-size:13px;
        }

        input[type="file"]{
            width:100%;
            margin-top:5px;
        }

        .btn{
            margin-top:15px;
            background:#162742;
            color:white;
            border:none;
            padding:10px;
            border-radius:8px;
            cursor:pointer;
            width:100%;
        }

        .preview{
            width:100%;
            margin-top:10px;
            border-radius:12px;
            border:1px solid #ddd;
            display:none;
        }

        .error{
            margin-top:10px;
            color:red;
            display:none;
            font-size:13px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <h1>Formulario de Análisis Médico</h1>
        <button class="logout" onclick="logout()">Salir</button>
    </div>

    <div class="grid">

        <!-- FORM -->
        <div class="box">

            <label>Subir Imagen</label>
            <input type="file" id="imageInput" accept="image/*">

            <button class="btn" id="analyzeBtn">Analizar con IA</button>

            <div id="errorMsg" class="error"></div>

        </div>

        <!-- PREVIEW -->
        <div class="box">
            <h3>Vista Previa</h3>
            <img id="preview" class="preview" alt="preview">
        </div>

    </div>

</div>


<!-- LIBRERÍAS -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    // 🔒 PROTEGER PÁGINA
    if(localStorage.getItem("loggedIn") !== "true"){
        window.location.href = "login.html";
    }

    function logout(){
        localStorage.clear();
        window.location.href = "login.html";
    }

    //  TEACHABLE MACHINE
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/pc4S8djsV/";

    let model = null;

    const errorMsg  = document.getElementById("errorMsg");

    async function loadModel(){
        try{
            const modelURL = MODEL_URL + "model.json";
            const metadataURL = MODEL_URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
        } catch (e){
            errorMsg.style.display = "block";
            errorMsg.textContent = "Error cargando el modelo. Verifica internet y abre con Live Server.";
            console.error(e);
        }
    }

    loadModel();

    // Preview imagen
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");

    imageInput.addEventListener("change", function(){
        errorMsg.style.display = "none";

        const file = this.files[0];
        if(file){
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
    });

    // Recomendaciones por clase (para resultados.html)
    const RECOMMENDATIONS = {
        "covid": [
            "Posible infección por COVID-19 según el modelo.",
            "Se recomienda realizar prueba confirmatoria.",
            "Monitorear saturación de oxígeno.",
            "Si presenta dificultad respiratoria acudir a urgencias."
        ],
        "normal": [
            "Resultado compatible con normalidad.",
            "Si presenta síntomas persistentes consulte a un médico.",
            "Mantener reposo e hidratación si hay malestar."
        ],
        "neumonia": [
            "Posible presencia de neumonía.",
            "Se recomienda valoración médica inmediata.",
            "Evitar automedicación.",
            "Puede requerir estudios complementarios."
        ],
        "neumotorax": [
            "Posible neumotórax detectado.",
            "Acudir inmediatamente a valoración médica.",
            "Si hay dolor torácico intenso o dificultad respiratoria, urgencias."
        ],
        "tuberculosis": [
            "Posible indicio de tuberculosis.",
            "Se recomienda prueba diagnóstica confirmatoria.",
            "Evitar contacto cercano hasta descartar diagnóstico.",
            "Acudir a valoración médica especializada."
        ]
    };

    document.getElementById("analyzeBtn").addEventListener("click", analyze);

    async function analyze(){
        errorMsg.style.display = "none";

        if(!preview.src || preview.style.display === "none"){
            errorMsg.style.display = "block";
            errorMsg.textContent = "Debe subir una imagen primero.";
            return;
        }

        if(!model){
            errorMsg.style.display = "block";
            errorMsg.textContent = "El modelo aún no está listo. Espera 2-3 segundos y vuelve a intentar.";
            return;
        }

        const prediction = await model.predict(preview);

        // mejor clase
        let best = prediction[0];
        prediction.forEach(p => {
            if(p.probability > best.probability) best = p;
        });

        const label = best.className.toLowerCase(); // covid, normal, etc.

        // ✅ Guardar para la página de resultados
        localStorage.setItem("lastDiagnosis", label);

        // ✅ Convertir imagen a base64 para que sobreviva al cambio de página
        const canvas = document.createElement("canvas");
        canvas.width = preview.naturalWidth;
        canvas.height = preview.naturalHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(preview, 0, 0);

        const base64Image = canvas.toDataURL("image/png");
        localStorage.setItem("lastImageData", base64Image);

        // ✅ Guardar recomendaciones (opcional, por si quieres usarlas allá)
        localStorage.setItem("lastRecs", JSON.stringify(RECOMMENDATIONS[label] || ["Consultar a un profesional de la salud."]));

        // ✅ Ir a la página de resultados
        window.location.href = "resultados.html";
    }
</script>

</body>
</html>
